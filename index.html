<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>p5.js Interactive Portfolio</title>
<style>

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;

    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    

    background-color: #0b0c10;
    background-image: 
      radial-gradient(circle at 20% 30%, rgba(124, 58, 237, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(244, 114, 182, 0.06) 0%, transparent 40%),
      radial-gradient(1px 1px at 10% 20%, #ffffff 100%, transparent),
      radial-gradient(1.5px 1.5px at 40% 70%, #ffffff 100%, transparent),
      radial-gradient(1px 1px at 70% 40%, rgba(255, 255, 255, 0.8) 100%, transparent),
      radial-gradient(2px 2px at 85% 15%, #ffffff 100%, transparent),
      radial-gradient(1px 1px at 30% 90%, rgba(255, 255, 255, 0.5) 100%, transparent);
    background-size: 100% 100%, 100% 100%, 200px 200px, 300px 300px, 250px 250px, 400px 400px, 150px 150px;
    color: #ffffff;
    padding: 60px 20px;
  }


  header {
    text-align: center;
    margin-bottom: 50px;
  }

  header h1 {
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(45deg, #cbd5e1, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 16px;
  }

  header p {
    font-size: 1rem;
    color: #e5e7eb;
    letter-spacing: 0.5px;
    font-weight: normal;
    opacity: 0.85;
  }


  #projects {
    display: grid;
    grid-template-columns: 1fr 1fr;
    width: 100%;
    max-width: 840px;
    gap: 32px;
    padding-bottom: 40px;
  }


  .project-card {
    background: rgba(22, 28, 45, 0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 24px;
    transition: all 0.3s ease;
  }


  .project-card:hover {
    border-color: rgba(192, 132, 252, 0.5);
    box-shadow: 0 0 25px rgba(124, 58, 237, 0.2);
  }

  .card-header {
    margin-bottom: 16px;
  }

  .project-card h3 {
    font-size: 1.1rem;
    font-weight: 600;
    color: #f3f4f6;
  }


  .project-point {
    color: #f472b6;
    margin-right: 6px;
    font-weight: 700;
  }


  .cell {
    width: 100%;
    aspect-ratio: 16 / 9;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    background: #000000;
  }


  .cell iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 200%;
    height: 200%;
    border: none;
    overflow: hidden;
    transform-origin: 0 0;
    transform: scale(0.5);
  }
</style>
</head>
<body>

<header>
  <h1>p5.js Creative Visual Portfolio</h1>
  <p>컴퓨터학부 | 학번: 20253434 | 이름: 윤수인</p>
</header>

<main id="projects">
  
  <div class="project-card">
    <div class="card-header">
      <h3><span class="project-point">Project 01.</span>도형 디자인</h3>
    </div>
    <div class="cell">
      <iframe src="sample1/index.html" scrolling="no"></iframe>
    </div>
  </div>

  <div class="project-card">
    <div class="card-header">
      <h3><span class="project-point">Project 04.</span>인터랙티브 무브</h3>
    </div>
    <div class="cell">
      <iframe src="sample4/index.html" scrolling="no"></iframe>
    </div>
  </div>

  <div class="project-card">
    <div class="card-header">
      <h3><span class="project-point">Project 02.</span>패턴 플레이</h3>
    </div>
    <div class="cell">
      <iframe src="sample2/index.html" scrolling="no"></iframe>
    </div>
  </div>

  <div class="project-card">
    <div class="card-header">
      <h3><span class="project-point">Project 03.</span>동적 캔버스</h3>
    </div>
    <div class="cell">
      <iframe src="sample3/index.html" scrolling="no"></iframe>
    </div>
  </div>

</main>

</body>
</html>
