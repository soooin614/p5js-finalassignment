<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>p5.js 작품 모음</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
    background: #f5f5f5;
  }

  h1 {
    margin-bottom: 20px;
    font-size: 1.6rem;
  }

  #projects {
    display: grid;
    grid-template-columns: 1fr 1fr;
    width: 100%;
    max-width: 600px;
    gap: 12px;
  }

  #projects .cell {
    aspect-ratio: 16 / 9;
    position: relative;
    overflow: hidden;
    border: 1px solid #ccc;
    border-radius: 8px;
  }

  #projects .cell iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 600px;
    height: 400px;
    border: none;
    transform-origin: top left;
    transform: scale(0.5);
  }
</style>
</head>
<body>

<h1>나의 p5.js 작품</h1>

<main id="projects">
  <div class="cell">
    <iframe src="sample1/index.html"></iframe>
  </div>
  <div class="cell">
    <iframe src="sample4/index.html"></iframe>
  </div>
  <div class="cell">
    <iframe src="sample2/index.html"></iframe>
  </div>
  <div class="cell">
    <iframe src="sample3/index.html"></iframe>
  </div>
</main>

</body>
</html>
