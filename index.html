<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>p5.js Interactive Portfolio</title>
<style>
  /* 전체 여백 초기화 */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    
    /* 1. 격자 제거 후 깊이감 있는 우주/별빛 감성 배경 적용 */
    background-color: #0b0c10;
    background-image: 
      radial-gradient(circle at 20% 30%, rgba(124, 58, 237, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(244, 114, 182, 0.06) 0%, transparent 40%),
      radial-gradient(1px 1px at 10% 20%, #ffffff 100%, transparent),
      radial-gradient(1.5px 1.5px at 40% 70%, #ffffff 100%, transparent),
      radial-gradient(1px 1px at 70% 40%, rgba(255, 255, 255, 0.8) 100%, transparent),
      radial-gradient(2px 2px at 85% 15%, #ffffff 100%, transparent),
      radial-gradient(1px 1px at 30% 90%, rgba(255, 255, 255, 0.5) 100%, transparent);
    background-size: 100% 100%, 100% 100%, 200px 200px, 300px 300px, 250px 250px, 400px 400px, 150px 150px;
    color: #ffffff;
    padding: 60px 20px;
  }

  /* 상단 헤더 영역 */
  header {
    text-align: center;
    margin-bottom: 50px;
  }

  header h1 {
    font-size: 2.6rem;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(45deg, #c084fc, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }

  /* 2. 인적사항 컬러를 더 밝게 수정 */
  header p {
    font-size: 1.05rem;
    color: #e5e7eb; /* 기존 회색에서 밝은 실버 화이트로 변경 */
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  /* 2행 2열 그리드 구조 (너비 확장) */
  #projects {
    display: grid;
    grid-template-columns: 1fr 1fr;
    width: 100%;
    max-width: 840px;
    gap: 32px;
    padding-bottom: 40px;
  }

  /* 3. 작품 카드 디자인 (떠오르는 효과 제거 및 네온 테두리 적용) */
  .project-card {
    background: rgba(22, 28, 45, 0.6); /* 반투명한 딥 네이비 유리 톤 */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 24px;
    transition: all 0.3s ease;
  }

  /* 마우스 호버 시: 움직이지 않고 테두리만 은은하게 빛남 */
  .project-card:hover {
    border-color: rgba(192, 132, 252, 0.5);
    box-shadow: 0 0 25px rgba(124, 58, 237, 0.2);
  }

  /* 카드 상단 헤더 (배지 제거로 깔끔하게 제목만 배치) */
  .card-header {
    margin-bottom: 16px;
  }

  .project-card h3 {
    font-size: 1.15rem;
    font-weight: 600;
    color: #f3f4f6;
  }

  /* 4. 스크롤바 방지를 위해 overflow: hidden 처리 및 크기 밸런스 조정 */
  .cell {
    width: 100%;
    aspect-ratio: 16 / 9;
    position: relative;
    overflow: hidden; /* 내부 스크롤바 강제 숨김 처리 */
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    background: #000000;
  }

  /* iframe이 스크롤바를 만들지 못하도록 영역 100% 제한 및 압축 */
  .cell iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 200%;
    height: 200%;
    border: none;
    overflow: hidden; /* iframe 내부 스크롤바 제거 */
    transform-origin: top left;
    transform: scale(0.5);
  }
</style>
</head>
<body>

<header>
  <h1>p5.js Creative Visual Portfolio</h1>
  <p>컴퓨터공학전공 | 학번: 202XXXXX | 이름: 윤수인</p>
</header>

<main id="projects">
  
  <div class="project-card">
    <div class="card-header">
      <h3>Project 01. 도형 디자인</h3>
    </div>
    <div class="cell">
      <iframe src="sample1/index.html" scrolling="no"></iframe>
    </div>
  </div>

  <div class="project-card">
    <div class="card-header">
      <h3>Project 04. 인터랙티브 무브</h3>
    </div>
    <div class="cell">
      <iframe src="sample4/index.html" scrolling="no"></iframe>
    </div>
  </div>

  <div class="project-card">
    <div class="card-header">
      <h3>Project 02. 패턴 플레이</h3>
    </div>
    <div class="cell">
      <iframe src="sample2/index.html" scrolling="no"></iframe>
    </div>
  </div>

  <div class="project-card">
    <div class="card-header">
      <h3>Project 03. 동적 캔버스</h3>
    </div>
    <div class="cell">
      <iframe src="sample3/index.html" scrolling="no"></iframe>
    </div>
  </div>

</main>

</body>
</html>
